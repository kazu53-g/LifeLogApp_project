<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>記録帳アプリ</title>
    <!-- Google Fonts（綺麗なフォント）の読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSSファイル -->
    <link rel="stylesheet" href="test.css">
</head>

<body>

    <header class="app-header">
        <h1>記録帳（テスト）</h1>
    </header>

    <!-- 編集中バッジ（空の時はCSSで自動非表示） -->
    <h2 id="status" class="editing-badge"></h2>

    <!-- 入力フォームエリア -->
    <div class="log-input container">
        <div class="form-group">
            <label for="title">タイトル</label>
            <input type="text" id="title" placeholder="タイトルを入力">
        </div>

        <div class="form-group">
            <label for="category">カテゴリ</label>
            <input type="text" id="category" placeholder="カテゴリ名を入力">
        </div>

        <div class="form-group">
            <label for="date">日付</label>
            <input type="date" id="date">
        </div>

        <div class="form-group">
            <label for="memo">メモ</label>
            <textarea id="memo" rows="5" placeholder="内容を入力"></textarea>
        </div>

        <div class="form-group">
            <label for="hour">作業時間</label>
            <div class="time-input-container">
                <input type="number" id="hour" min="0" value="0">
                <span class="unit">時間</span>
                <input type="number" id="minute" min="0" max="59" value="0">
                <span class="unit">分</span>
            </div>
        </div>

        <button id="save-btn" class="save-btn">新規保存</button>
    </div>

    <!-- 記録一覧エリア -->
    <div class="log-section container">
        <h2>記録一覧</h2>
        <div id="record-list">
            <p id="empty-message">まだ記録はありません</p>
        </div>
    </div>

    <!-- JavaScriptファイル -->
    <script src="test.js"></script>

</body>

</html>
