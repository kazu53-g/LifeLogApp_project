<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>記録帳アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>記録帳（テスト）</h1>

    <h2 id="status" style="color: red"></h2>
    <div class="log-input">
        <label for="title">タイトル</label><br>
        <input type="text" id="title" placeholder="タイトルを入力"><br><br>

        <label for="category">カテゴリ</label><br>
        <input type="text" id="category" placeholder="カテゴリ名を入力"><br><br>

        <label for="date">日付</label><br>
        <input type="date" id="date"><br><br>

        <label for="memo">メモ</label><br>
        <textarea id="memo" rows="5" cols="40" placeholder="内容を入力"></textarea><br><br>

        <label for="hour">作業時間</label><br>

        <input type="number" id="hour" min="0" value="0"> 時間
        <input type="number" id="minute" min="0" max="59" value="0"> 分

        <br><br>

        <button id="save-btn">新規保存</button>
    </div>
    <hr>

    <div class="log-section">
        <div class="menu-toggle">
            <div class="one"></div>
            <div class="two"></div>
            <div class="three"></div>
        </div>

        <nav class="hidden">
            <h2>記録一覧</h2>
            <div id="record-list">
                <p id="empty-message">まだ記録はありません</p>
            </div>
        </nav>
    </div>
    <!-- <script src="script.js"></script> -->
    <script src="test.js"></script>

</body>

</html>
